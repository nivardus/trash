name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.7-stable

permissions:
  contents: read
  packages: write

jobs:
  export:
    name: Export (web + dedicated server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Godot ${{ env.GODOT_VERSION }} and export templates
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ env.GODOT_VERSION }}

      - name: Import project
        working-directory: client
        run: godot --headless --import || true

      - name: Export Web
        working-directory: client
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Export dedicated server (amd64)
        working-directory: client
        run: |
          mkdir -p build/server/amd64
          godot --headless --export-release "Linux Server" build/server/amd64/trash_server

      - name: Export dedicated server (arm64)
        working-directory: client
        run: |
          mkdir -p build/server/arm64
          godot --headless --export-release "Linux Server ARM64" build/server/arm64/trash_server

      - name: Export desktop client (Linux)
        working-directory: client
        run: |
          mkdir -p build/client/linux
          godot --headless --export-release "Linux" build/client/linux/trash.x86_64

      - name: Export desktop client (Windows)
        working-directory: client
        run: |
          mkdir -p build/client/windows
          godot --headless --export-release "Windows" build/client/windows/trash.exe

      - name: Export desktop client (macOS)
        working-directory: client
        run: |
          mkdir -p build/client/macos
          godot --headless --export-release "macOS" build/client/macos/trash.zip

      - name: Package desktop client artifacts
        working-directory: client/build/client
        run: |
          set -eux
          zip -r ../trash-linux-x86_64.zip linux
          zip -r ../trash-windows-x86_64.zip windows
          # macOS export is already a .zip bundle
          cp macos/trash.zip ../trash-macos-universal.zip

      - name: Upload desktop client artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-clients
          path: |
            client/build/trash-linux-x86_64.zip
            client/build/trash-windows-x86_64.zip
            client/build/trash-macos-universal.zip

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: client/build/web

      - name: Upload server binaries artifact
        uses: actions/upload-artifact@v7
        with:
          name: server
          path: client/build/server

  docker:
    name: Build & push multi-arch server + web images
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download server binaries
        uses: actions/download-artifact@v8
        with:
          name: server
          path: client/build/server

      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: web
          path: client/build/web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server image metadata
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: client
          file: client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Web image metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: client
          file: client/Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

  deploy:
    name: Deploy to trash.place
    needs: docker
    # Only roll out from main. Tag builds publish images/releases but don't
    # touch the running droplet (pin IMAGE_TAG in the droplet's .env instead).
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      # Never let two deploys race on the droplet; queue them instead.
      group: deploy-production
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      SERVER_DOMAIN: trash.place
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pin the host key so the connection can't be silently MITM'd.
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy deploy files to droplet
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /opt/trash'
          # Ships compose file, Caddyfile, .env.example, README — leaves the
          # droplet's own .env (not in the repo) untouched.
          scp -i ~/.ssh/deploy_key -r deploy/. "$DEPLOY_USER@$DEPLOY_HOST:/opt/trash/"

      - name: Pull images and restart
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" bash -euo pipefail <<'REMOTE'
            cd /opt/trash
            # First-ever deploy: seed .env from the example (SERVER_DOMAIN is
            # already set to trash.place there).
            [ -f .env ] || cp .env.example .env
            docker compose pull
            docker compose up -d --remove-orphans
          REMOTE

      - name: Verify containers are running
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" bash -euo pipefail <<'REMOTE'
            cd /opt/trash
            # Give containers a moment to settle before inspecting them.
            sleep 5
            docker compose ps
            fail=0
            for svc in $(docker compose config --services); do
              cid=$(docker compose ps -q "$svc")
              if [ -z "$cid" ]; then
                echo "::error::service '$svc' has no container"
                fail=1
                continue
              fi
              status=$(docker inspect -f '{{.State.Status}}' "$cid")
              # A container with a HEALTHCHECK also has a health string; treat a
              # defined-but-unhealthy check as a failure.
              health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")
              echo "$svc: status=$status health=$health"
              if [ "$status" != "running" ] || [ "$health" = "unhealthy" ]; then
                echo "::error::service '$svc' is not healthy (status=$status health=$health)"
                docker compose logs --tail=80 "$svc" || true
                fail=1
              fi
            done
            exit $fail
          REMOTE

      - name: Verify site responds over HTTPS
        run: |
          set -euo pipefail
          # Caddy may still be fetching/renewing a cert on a fresh boot, so retry.
          for attempt in $(seq 1 20); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "https://$SERVER_DOMAIN/" || true)
            echo "attempt $attempt: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "$SERVER_DOMAIN is serving the client."
              exit 0
            fi
            sleep 6
          done
          echo "::error::$SERVER_DOMAIN did not return HTTP 200 after retries"
          exit 1

  release:
    name: Publish desktop client release
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop client artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-clients
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
